# Release workflow: versions via changesets and publishes to npm.
#
# If publish fails with E404 or "Access token expired or revoked":
# 1. Ensure npm organization "labcatr" exists (npmjs.com) and the publishing user can publish there.
# 2. Create a new npm token (Profile → Access Tokens) and set GitHub secret NPM_AUTH_TOKEN to it.
#    Disable "2FA for package publishing" on npm if using a classic token for CI.
name: Release

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  changelog:
    name: Changelog PR or Release
    if: ${{ github.repository_owner == 'labcatr' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: latest 

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Note: pnpm install after versioning is necessary to refresh lockfile
          version: pnpm run version
          publish: pnpm exec changeset publish
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.LAB_ACTIONS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
