# Release workflow: versions via changesets and publishes to npm.
#
# Uses OIDC trusted publishing — no long-lived npm tokens needed.
# Requires trusted publisher configured on npmjs.org:
#   https://www.npmjs.com/package/@labcatr/labcommitr/access
#   → Trusted Publisher → GitHub Actions
#   → Organization: labcatr, Repository: labcommitr, Workflow: release.yml
name: Release

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  changelog:
    name: Changelog PR or Release
    if: ${{ github.repository_owner == 'labcatr' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm run build

      # Versioning only — publish is handled separately via OIDC
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish via OIDC trusted publishing (no npm token required).
      # Only runs when changesets have already been consumed (version PR merged).
      - name: Publish to npm
        id: publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          npm install -g npm@latest
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @labcatr/labcommitr version 2>/dev/null || echo "")
          if [ "$CURRENT_VERSION" != "$PUBLISHED" ]; then
            echo "Publishing @labcatr/labcommitr@${CURRENT_VERSION}"
            npm publish --provenance --access public
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${CURRENT_VERSION} already published, skipping."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        run: |
          VERSION="v${{ steps.publish.outputs.version }}"
          CHANGELOG=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(awk '/^## '"${VERSION#v}"'/{found=1; next} /^## [0-9]/{if(found) exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release ${VERSION}"
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$CHANGELOG" \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
